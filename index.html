<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACM Member Enrollment 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23c8181a%22/><text y=%22.9em%22 font-size=%2270%22 fill=%22white%22 font-family=%22Orbitron%22 x=%2250%%22 text-anchor=%22middle%22 font-weight=%22bold%22>M</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --red: #c8181a;
            --red-dark: #7a0000;
            --black: #0f0f0f;
            --grey: #888;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #ccc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 10px;
        }

        .bg-layers {
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background:
                radial-gradient(ellipse 55% 50% at 100% 0%, rgba(180,10,10,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 40% 35% at 0% 100%, rgba(20,0,0,0.08) 0%, transparent 65%),
                radial-gradient(ellipse 70% 60% at 50% 50%, #ffffff 35%, rgba(248,243,243,1) 100%);
            background-size: 200% 200%;
            animation: gradientShift 12s ease-in-out infinite alternate;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: -1;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(0,0,0,0.015) 47px, rgba(0,0,0,0.015) 48px),
                repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(0,0,0,0.015) 47px, rgba(0,0,0,0.015) 48px);
        }

        .card-frame {
            position: relative;
            background: #fff;
            box-shadow: 0 24px 80px rgba(0,0,0,0.22);
            border-top: 9px solid var(--red);
            border-bottom: 9px solid var(--red-dark);
            width: 100%;
            max-width: 950px;
            min-height: 620px;
            display: flex;
            flex-direction: column;
        }

        .corner { position: absolute; width: 18px; height: 18px; border-color: var(--red); border-style: solid; opacity: 0.5; pointer-events: none; z-index: 5; }
        .corner.tl { top: 15px; left: 15px; border-width: 2px 0 0 2px; }
        .corner.tr { top: 15px; right: 15px; border-width: 2px 2px 0 0; }
        .corner.bl { bottom: 15px; left: 15px; border-width: 0 0 2px 2px; }
        .corner.br { bottom: 15px; right: 15px; border-width: 0 2px 2px 0; }

        .title-oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .tech-orbitron { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        .form-input { 
            width: 100%;
            padding: 1rem;
            background: white;
            border: 2px solid #0f172a;
            outline: none;
            transition: border-color 0.2s;
            font-size: 1.5rem;
            font-weight: 700;
            color: black;
            border-radius: 0.5rem;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
        }
        .form-input::placeholder { color: #cbd5e1; }
        .form-input:focus { border-color: #dc2626; }

        .btn-action {
            padding: 14px 32px;
            background: var(--red);
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(180,10,10,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-action:hover { background: var(--red-dark); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(180,10,10,0.45); }
        .btn-action:active { transform: translateY(0); scale: 0.98; }

        .btn-selection {
            flex: 1;
            padding: 1rem;
            border: 2px solid;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
            transition: all 0.2s;
            border-radius: 0.5rem;
            font-family: 'Oswald', sans-serif;
        }
        .btn-selection.active { background: black; color: white; border-color: black; box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
        .btn-selection.inactive { background: white; color: #94a3b8; border-color: #e2e8f0; }
        .btn-selection.inactive:hover { border-color: #fca5a5; color: #dc2626; }

        .card-animation { animation: certSlideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes certSlideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .custom-alert {
            animation: alertFade 0.3s ease forwards;
        }
        @keyframes alertFade { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .audit-title-card {
            text-align: center;
            padding: 2.5rem 0;
        }
        .audit-title-card .audit-icon {
            width: 4rem; height: 4rem;
            color: #dc2626;
            margin: 0 auto 1.5rem;
            opacity: 0.15;
        }
        .audit-title-card h2 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            line-height: 1;
        }
        .audit-title-card .divider {
            height: 4px; width: 3rem;
            background: #dc2626;
            margin: 1.5rem auto 1rem;
        }
        .audit-title-card .desc {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-style: italic;
            margin-top: 0.5rem;
        }
    </style>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('formApp', () => ({
                step: 0,
                totalSteps: 11,
                submitted: false,
                loading: false,
                showAlert: false,
                isClosed: false,
                errorText: '',
                // USER CAN UPDATE THIS ENDPOINT TO GO TO THEIR GENERAL MEMBER GOOGLE SCRIPT
                scriptUrl: 'https://script.google.com/macros/s/AKfycbxIw_9AmKKjjHUdwUQ76lHyYGJgAEnKcn-LtpwNUq_EOxgleRWQfI3P37JMyzBRBt0D/exec',
                formData: {
                    name: '', year: '', section: '', sapId: '', email: '', contact: '', branch: '',
                    interests: [], motivation: ''
                },
                interestData: {
                    "Technical & Development": "Software development, competitive programming, and curating technical events.",
                    "Events & Logistics": "Operations, venue planning, scheduling, and ground coordination.",
                    "Content & Public Relations": "Outreach, newsletter writing, and managing external communications.",
                    "Social Media & Design": "UI/UX, graphics, and social media posting strategies.",
                    "Media Production": "Photography, videography, video editing, and motion graphics.",
                    "Finance & Sponsorships": "Securing corporate sponsorships, budgeting, and financial planning."
                },
                init() { 
                    lucide.createIcons(); 
                    // DEADLINE: 30-09-2026 at 11:59pm
                    // Month is 0-indexed (September = 8)
                    const deadline = new Date(2026, 8, 30, 23, 59); 
                    if (new Date() >= deadline) {
                        this.isClosed = true;
                    }
                },
                triggerError(msg) {
                    this.errorText = msg;
                    this.showAlert = true;
                    setTimeout(() => { this.showAlert = false; }, 4000);
                },
                handleNext() {
                    if (this.step === 2 && !this.formData.name) return this.triggerError("NAME REQUIRED");
                    if (this.step === 3 && this.formData.sapId.length !== 11) return this.triggerError("SAP ID MUST BE 11 DIGITS");
                    if (this.step === 4) {
                        const email = (this.formData.email || '').trim().toLowerCase();
                        if (!email.endsWith('@nmims.in') && !email.endsWith('@nmims.edu')) {
                            return this.triggerError("MUST BE @NMIMS.IN OR @NMIMS.EDU EMAIL");
                        }
                    }
                    if (this.step === 5 && this.formData.contact.length < 10) return this.triggerError("10-DIGIT CONTACT REQUIRED");
                    if (this.step === 7 && !this.formData.year) return this.triggerError("SELECT YEAR");
                    if (this.step === 8 && !this.formData.section) return this.triggerError("SELECT SECTION");
                    if (this.step === 9 && !this.formData.branch) return this.triggerError("SELECT BRANCH");

                    if (this.step < this.totalSteps - 1) {
                        this.step++;
                    } else {
                        this.submitForm();
                    }
                    this.$nextTick(() => lucide.createIcons());
                },
                handleBack() {
                    if (this.step > 0) {
                        this.step--;
                    }
                    this.$nextTick(() => lucide.createIcons());
                },
                resetForm() {
                    this.step = 0;
                    this.submitted = false;
                    this.formData = { name: '', year: '', section: '', sapId: '', email: '', contact: '', branch: '', interests: [], motivation: '' };
                    this.$nextTick(() => lucide.createIcons());
                },
                async submitForm() {
                    this.loading = true;
                    try {
                        await fetch(this.scriptUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            cache: 'no-cache',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(this.formData)
                        });
                        this.submitted = true;
                    } catch (error) { 
                        this.triggerError("SUBMISSION ERROR - RETRY");
                    } finally { this.loading = false; }
                }
            }));
        });
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

    <div class="bg-layers"></div>
    <div class="bg-grid"></div>

    <div x-data="formApp" class="w-full min-h-screen flex items-center justify-center relative">
        <!-- CUSTOM ALERT -->
        <div x-show="showAlert" x-cloak class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] custom-alert">
            <div class="bg-red-600 text-white px-8 py-4 title-oswald italic font-bold shadow-2xl border-l-8 border-black flex items-center gap-4">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                <span x-text="errorText"></span>
            </div>
        </div>

        <!-- CLOSING OVERLAY (FULL SCREEN) -->
        <div x-show="isClosed" x-cloak class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center overflow-y-auto p-6 md:p-12 card-animation">
            <!-- Background Decoration -->
            <div class="absolute inset-0 bg-grid opacity-30 pointer-events-none"></div>
            <div class="bg-layers absolute inset-0 opacity-10 pointer-events-none"></div>
            
            <div class="relative z-10 w-full max-w-7xl flex flex-col items-center text-center">
                
                <!-- TOP ROW: NMIMS | CLOCK | ACMs -->
                <div class="w-full flex items-center justify-between mb-12 md:mb-20 px-4 md:px-8">
                    <!-- Left: NMIMS Logo -->
                    <div class="w-28 h-12 md:w-44 md:h-16 bg-white p-2 shadow-sm rounded-lg border border-slate-100 flex items-center justify-center shrink-0">
                        <img src="nmims.png" alt="NMIMS" class="max-h-full max-w-full object-contain">
                    </div>
                    
                    <!-- Center: Clock Icon -->
                    <div class="w-20 h-20 md:w-28 md:h-28 bg-red-600 text-white rounded-full flex items-center justify-center shadow-2xl shrink-0 ring-8 ring-red-50 mx-4">
                        <i data-lucide="clock" class="w-10 h-10 md:w-14 md:h-14"></i>
                    </div>

                    <!-- Right: ACM & ACM-W Logos -->
                    <div class="flex items-center gap-3 md:gap-4 shrink-0">
                        <div class="w-12 h-12 md:w-16 md:h-16 bg-white p-2 shadow-sm rounded-lg border border-slate-100 flex items-center justify-center">
                            <img src="acm.png" alt="ACM" class="max-h-full max-w-full object-contain">
                        </div>
                        <div class="w-12 h-12 md:w-16 md:h-16 bg-white p-2 shadow-sm rounded-lg border border-slate-100 flex items-center justify-center">
                            <img src="acmw.png" alt="ACM-W" class="max-h-full max-w-full object-contain">
                        </div>
                    </div>
                </div>

                <!-- Structured Content -->
                <div class="space-y-6 px-4">
                    <h1 class="title-oswald text-5xl sm:text-7xl md:text-9xl font-black text-black italic leading-[0.85] uppercase tracking-tighter">
                        Registrations Closed.
                    </h1>
                    
                    <div class="h-2 w-48 bg-red-600 mx-auto my-12"></div>
                    
                    <p class="title-oswald text-xl sm:text-2xl md:text-4xl font-bold text-slate-800 italic uppercase max-w-5xl mx-auto leading-tight">
                        Registrations For ACM NMIMS Indore Student Chapter <br class="hidden sm:block"> General Membership 2026 Are Closed.
                    </p>
                    
                    <p class="text-slate-500 text-lg md:text-3xl font-semibold italic uppercase tracking-[0.15em] mt-10">
                        Please reach out to an office bearer or contact us for further queries.
                    </p>
                </div>
            </div>

            <!-- Lock decoration -->
            <div class="absolute -bottom-20 -left-20 opacity-[0.03] pointer-events-none hidden lg:block">
                <i data-lucide="lock" class="w-[500px] h-[500px] text-black"></i>
            </div>
            <div class="absolute -top-20 -right-20 opacity-[0.03] pointer-events-none hidden lg:block">
                <i data-lucide="shield" class="w-[500px] h-[500px] text-black"></i>
            </div>
        </div>

        <div x-cloak class="card-frame card-animation">
            <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

            <template x-if="submitted">
                <div class="flex-grow flex flex-col items-center justify-center p-8 sm:p-12 text-center relative z-10">
                    <div class="w-20 h-20 bg-red-600 text-white rounded-full flex items-center justify-center mb-6 shadow-2xl">
                        <i data-lucide="shield-check" class="w-10 h-10"></i>
                    </div>
                    <h1 class="title-oswald text-4xl sm:text-5xl font-black text-black italic leading-tight uppercase">Transmission Successful</h1>
                    <div class="h-1 w-24 bg-red-600 my-6 mx-auto"></div>
                    <p class="text-slate-500 text-lg font-medium max-w-lg mb-8 italic">Your general member enrollment details for the 2026 session have been successfully processed.</p>
                    
                    <!-- Members Redirect block -->
                    <div class="mb-10 p-6 border-2 border-slate-900 bg-white text-left max-w-lg w-full relative overflow-hidden shadow-xl">
                        <div class="absolute -top-4 -right-4 opacity-5"><i data-lucide="users" class="w-24 h-24"></i></div>
                        <h4 class="tech-orbitron text-[10px] tracking-[5px] mb-2 uppercase font-bold text-slate-400">Official Channel</h4>
                        <p class="title-oswald text-2xl font-bold mb-3 italic leading-none uppercase">Join the WhatsApp Group</p>
                        <p class="text-xs text-slate-500 mb-6 font-medium leading-relaxed italic">Join the official ACM Indore Student Member WhatsApp group for event updates, project announcements, and code releases.</p>
                        <a href="https://chat.whatsapp.com/GgaHwBD4lTcBckvH6nM4IU" target="_blank" class="btn-action w-full">
                            Join Official WhatsApp Group <i data-lucide="external-link" class="w-4 h-4"></i>
                        </a>
                    </div>

                    <button @click="resetForm()" class="title-oswald text-slate-400 hover:text-black font-bold uppercase flex items-center gap-2 tracking-widest transition-colors">
                        <i data-lucide="home" class="w-5 h-5"></i> Return to Command
                    </button>
                </div>
            </template>

            <template x-if="!submitted">
                <div class="flex-grow flex flex-col relative z-10 h-full">
                    
                    <div class="p-6 sm:p-10 pb-4 flex justify-between items-start">
                        <div class="flex flex-col pr-4">
                            <span class="tech-orbitron text-[9px] text-red-600 font-bold uppercase tracking-[4px] sm:tracking-[6px]">ACM Member Portal</span>
                            <span class="title-oswald text-xl sm:text-2xl font-black italic truncate uppercase" x-text="step === 0 ? 'ACCESS AUTHORIZATION' : 'MEMBER ENROLLMENT 2026'"></span>
                        </div>
                        <div class="text-right flex flex-col items-end shrink-0">
                            <span class="tech-orbitron text-[8px] sm:text-[9px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1" x-text="`S-INDEX: ${step + 1}`"></span>
                            <span class="title-oswald text-base sm:text-lg font-bold text-black italic leading-none" x-text="`${Math.round((step/totalSteps)*100)}%`"></span>
                        </div>
                    </div>

                    <div class="px-6 sm:px-10 mb-6">
                        <div class="h-[2px] w-full bg-slate-100 relative">
                            <div class="h-full bg-red-600 transition-all duration-700 shadow-[0_0_15px_rgba(200,24,26,0.5)]" :style="`width: ${((step + 1) / totalSteps) * 100}%`"></div>
                        </div>
                    </div>

                    <div class="px-6 sm:px-20 flex-grow flex flex-col justify-center">

                        <!-- STEP 0: Landing -->
                        <div x-show="step === 0" class="text-center card-animation">
                            <div class="flex flex-col items-center mb-6">
                                <img src="nmims.png" alt="NMIMS" class="h-8 sm:h-11 w-auto object-contain mb-3">
                                <p class="tech-orbitron text-[10px] text-slate-400 font-bold uppercase tracking-[2px] mb-3 italic">In Association With</p>
                                <div class="flex justify-center items-center gap-6 sm:gap-10">
                                    <img src="acm.png" alt="ACM" class="h-12 sm:h-16 w-auto object-contain">
                                    <img src="acmw.png" alt="ACM-W" class="h-12 sm:h-16 w-auto object-contain">
                                </div>
                            </div>
                            <p class="tech-orbitron text-[8px] sm:text-[9px] text-slate-500 font-bold uppercase tracking-[2px] mb-8 leading-relaxed max-w-md mx-auto">
                                SVKM's NMIMS Indore Student Chapter <br> Association for Computing Machinery (ACM)
                            </p>
                            <div class="title-oswald text-7xl sm:text-9xl font-black text-black leading-[0.8] italic mb-6">JOIN<br><span class="text-red-600">ACM</span></div>
                            <div class="h-1 w-24 bg-red-600 mx-auto mb-8"></div>
                            <p class="text-slate-500 font-semibold tracking-[4px] sm:tracking-[5px] uppercase text-[10px]">student chapter member enrollment 2026</p>
                            <p class="mt-6 text-slate-600 font-medium italic max-w-sm mx-auto text-base leading-relaxed">Initiating search for curious minds to join the premier computing society ecosystem at NMIMS Indore.</p>
                            
                            <!-- Notice Badge -->
                            <div class="mt-8 p-4 border border-red-600/20 bg-red-50/50 text-slate-800 max-w-md mx-auto rounded-lg shadow-sm">
                                <div class="flex items-center justify-center gap-2 mb-1 text-red-600">
                                    <i data-lucide="info" class="w-4 h-4"></i>
                                    <span class="tech-orbitron text-[10px] font-bold tracking-[2px] uppercase">Enrollment Notice</span>
                                </div>
                                <p class="text-xs font-semibold uppercase italic tracking-wide text-slate-700 leading-relaxed">
                                    This form is strictly for joining as a general ACM member. It is <span class="text-red-600">NOT</span> for the Organizing Committee (OC) of the ACM Club.
                                </p>
                            </div>
                        </div>

                        <!-- STEP 1: PERSONAL DETAILS AUDIT title card -->
                        <div x-show="step === 1" class="audit-title-card card-animation">
                            <i data-lucide="user" class="audit-icon"></i>
                            <h2>Personal Details Audit</h2>
                            <div class="divider"></div>
                            <p class="desc">Provide your identity credentials — name, SAP ID, email, and contact number.</p>
                        </div>

                        <!-- STEP 2: Full Name -->
                        <div x-show="step === 2" class="card-animation">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Personal Details</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Your Full Name</h2>
                            <input type="text" class="form-input" placeholder="FULL LEGAL NAME" x-model="formData.name" @keydown.enter="handleNext">
                        </div>

                        <!-- STEP 3: SAP ID -->
                        <div x-show="step === 3" class="card-animation">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Protocol</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-2 italic leading-none">SAP ID</h2>
                            <p class="text-[10px] text-slate-400 mb-10 font-bold uppercase tracking-[3px]">Strict 11-Digit numerical input</p>
                            <input type="text" maxlength="11" class="form-input tech-orbitron" placeholder="7XXXXXXXXXX" x-model="formData.sapId" @keydown.enter="handleNext">
                        </div>

                        <!-- STEP 4: Email -->
                        <div x-show="step === 4" class="card-animation">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Contact</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Email Address</h2>
                            <input type="email" class="form-input" placeholder="UNIVERSITY EMAIL (@nmims.in / @nmims.edu)" x-model="formData.email" @keydown.enter="handleNext">
                        </div>

                        <!-- STEP 5: Contact -->
                        <div x-show="step === 5" class="card-animation">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Contact</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Contact Number</h2>
                            <input type="text" maxlength="10" class="form-input" placeholder="10-DIGIT MOBILE" x-model="formData.contact" @keydown.enter="handleNext">
                        </div>

                        <!-- STEP 6: ACADEMIC AUDIT title card -->
                        <div x-show="step === 6" class="audit-title-card card-animation">
                            <i data-lucide="book-open" class="audit-icon"></i>
                            <h2>Academic Audit</h2>
                            <div class="divider"></div>
                            <p class="desc">Specify your current year of study, section, and engineering branch.</p>
                        </div>

                        <!-- STEP 7: Year -->
                        <div x-show="step === 7" class="card-animation text-center">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Academics</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Year</h2>
                            <div class="grid grid-cols-2 gap-4">
                                <template x-for="yr in ['I', 'II', 'III', 'IV']">
                                    <button @click="formData.year = yr; handleNext()" class="btn-selection" :class="formData.year === yr ? 'active' : 'inactive'" x-text="yr"></button>
                                </template>
                            </div>
                        </div>

                        <!-- STEP 8: Section -->
                        <div x-show="step === 8" class="card-animation text-center">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Cluster</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Section</h2>
                            <div class="grid grid-cols-3 gap-4">
                                <template x-for="sec in ['A', 'B', 'C']">
                                    <button @click="formData.section = sec; handleNext()" class="btn-selection" :class="formData.section === sec ? 'active' : 'inactive'" x-text="sec"></button>
                                </template>
                            </div>
                        </div>

                        <!-- STEP 9: Branch -->
                        <div x-show="step === 9" class="card-animation text-center">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Branch</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-10 italic leading-none">Stream</h2>
                            <div class="space-y-4">
                                <template x-for="br in ['CE', 'AI&DS', 'MBA Tech']">
                                    <button @click="formData.branch = br; handleNext()" class="btn-selection w-full block" :class="formData.branch === br ? 'active' : 'inactive'" x-text="br"></button>
                                </template>
                            </div>
                        </div>

                        <!-- STEP 10: Review -->
                        <div x-show="step === 10" class="card-animation">
                            <label class="tech-orbitron text-[10px] text-red-600 font-bold tracking-[4px] mb-4 block uppercase">Verification</label>
                            <h2 class="title-oswald text-3xl sm:text-5xl font-black uppercase mb-6 italic leading-none uppercase">Review Details</h2>
                            <div class="space-y-4 max-h-80 overflow-y-auto pr-4">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left">
                                    <div class="p-3 border-2 border-slate-900 bg-white">
                                        <span class="tech-orbitron text-[9px] text-slate-400 font-bold uppercase tracking-wider block">Full Name</span>
                                        <span class="title-oswald text-lg font-bold italic uppercase" x-text="formData.name"></span>
                                    </div>
                                    <div class="p-3 border-2 border-slate-900 bg-white">
                                        <span class="tech-orbitron text-[9px] text-slate-400 font-bold uppercase tracking-wider block">SAP ID</span>
                                        <span class="title-oswald text-lg font-bold italic uppercase" x-text="formData.sapId"></span>
                                    </div>
                                    <div class="p-3 border-2 border-slate-900 bg-white sm:col-span-2">
                                        <span class="tech-orbitron text-[9px] text-slate-400 font-bold uppercase tracking-wider block">Email & Contact</span>
                                        <span class="title-oswald text-base font-bold italic block truncate" x-text="`${formData.email} | ${formData.contact}`"></span>
                                    </div>
                                    <div class="p-3 border-2 border-slate-900 bg-white sm:col-span-2">
                                        <span class="tech-orbitron text-[9px] text-slate-400 font-bold uppercase tracking-wider block">Academics</span>
                                        <span class="title-oswald text-lg font-bold italic uppercase" x-text="`${formData.branch} - Year ${formData.year} - Sec ${formData.section}`"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="p-6 sm:px-20 pb-12 sm:pb-16 mt-4">
                        <div class="flex flex-col sm:flex-row gap-6 items-center">
                            <button x-show="step > 0" @click="handleBack" class="title-oswald text-slate-400 font-bold hover:text-black transition-colors flex items-center gap-2 group tracking-[3px]">
                                <i data-lucide="chevron-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Return
                            </button>
                            <button @click="handleNext" :disabled="loading" class="btn-action w-full sm:flex-grow">
                                <span x-text="loading ? 'ENCRYPTING...' : (step === 0 ? 'Initialize Entry' : (step === 10 ? 'Authorize Submission' : 'Confirm Protocol'))"></span>
                                <i x-show="!loading" data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </div>

</body>
</html>
